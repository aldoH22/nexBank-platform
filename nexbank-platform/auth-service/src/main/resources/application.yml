# ============================================
#     CONFIGURACIoN AUTH SERVICE
# ============================================

server:
  port: 8081

spring:
  application:
    name: auth-service

  # Deshabilitar verificador de compatibilidad Spring Cloud
  cloud:
    compatibility-verifier:
      enabled: false

  # Configuracion de MySQL
  datasource:
    url: jdbc:mysql://localhost:3306/nexbank_auth
    username: nexbank_user
    password: nexbank_password
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Configuracion de JPA/Hibernate
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  # Configuracion de Redis
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 60000

# Configuracion de Eureka Client
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

# Configuracion de Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    com.nexbank.auth: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG

# Configuración JWT
jwt:
  secret: NexBankSecretKeyForJWTTokenGenerationThisIsAVeryLongSecretKey2024!
  expiration: 86400000  # 24 horas en milisegundos
  refresh-expiration: 604800000  # 7 días en milisegundos