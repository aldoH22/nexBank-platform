# ============================================
#     CONFIGURACION ACCOUNT SERVICE
# ============================================

server:
  port: 8082

spring:
  application:
    name: account-service
  
  # Deshabilitar verificador de compatibilidad
  cloud:
    compatibility-verifier:
      enabled: false
  
  # Configuracion de MySQL
  datasource:
    url: jdbc:mysql://localhost:3306/nexbank_accounts
    username: nexbank_user
    password: nexbank_password
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  # Configuracion de JPA/Hibernate
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

# Configuracion de Eureka Client
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

# Configuracion de Feign Client
feign:
  client:
    config:
      default:
        connect-timeout: 5000
        read-timeout: 5000
        logger-level: full

# Configuracion de Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    com.nexbank.account: DEBUG
    org.springframework.cloud.openfeign: DEBUG
    org.hibernate.SQL: DEBUG